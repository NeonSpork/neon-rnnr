<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0814">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>neon rnnr</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">

  <style>
    :root {
      --bg: #0a0814;
      --surface: rgba(22, 17, 40, 0.85);
      --surface-variant: rgba(36, 27, 66, 0.9);
      --accent-cyan: #00f2fe;
      --accent-pink: #ff007f;
      --accent-purple: #7928ca;
      --on-surface: #f8fafc;
      --on-surface-muted: #94a3b8;
      --outline: rgba(0, 242, 254, 0.2);
      --outline-glow: rgba(255, 0, 127, 0.4);
      --radius: 14px;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

    body {
      background-color: var(--bg);
      color: var(--on-surface);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
      padding-top: calc(24px + env(safe-area-inset-top));
      position: relative;
      overflow-x: hidden;
    }

    /* --- Retro Synthwave Grid Background --- */
    .grid-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -2;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #1e1035 0%, #0a0814 80%);
    }

    .grid-floor {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(to right, rgba(0, 242, 254, 0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 0, 127, 0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(500px) rotateX(60deg);
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
    }

    /* CRT Scanline Effect Overlay */
    .scanlines {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.25) 50%
      );
      background-size: 100% 4px;
    }

    /* --- Header --- */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .app-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--accent-cyan)); }
    
    h1 { 
      font-size: 1.5rem; 
      font-weight: 800; 
      letter-spacing: 1.5px; 
      text-transform: lowercase; 
      color: var(--on-surface);
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
    }

    .icon-btn {
      background: var(--surface);
      color: var(--accent-pink);
      border: 1px solid var(--outline-glow);
      border-radius: var(--radius);
      padding: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 12px rgba(255, 0, 127, 0.2);
      transition: all 0.2s ease;
    }

    .icon-btn:active { transform: scale(0.95); opacity: 0.8; }
    .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* --- Task List & Glass Cards --- */
    .task-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    
    .task-card {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.25s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    .task-card:active {
      transform: scale(0.98);
      background: var(--surface-variant);
    }

    .task-card.completed {
      opacity: 0.5;
      border-color: rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }

    .task-card.completed .task-text {
      text-decoration: line-through;
      color: var(--on-surface-muted);
      text-shadow: none;
    }

    .checkbox {
      width: 24px; height: 24px; border-radius: 8px;
      border: 2px solid var(--accent-pink);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
      transition: all 0.2s ease;
    }

    .task-card.completed .checkbox {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      box-shadow: 0 0 12px rgba(255, 0, 127, 0.8);
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
      color: var(--on-surface);
      letter-spacing: 0.3px;
    }

    /* --- Modals --- */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 8, 20, 0.85); backdrop-filter: blur(8px); z-index: 100;
      align-items: center; justify-content: center; padding: 24px;
    }

    .modal-overlay.active { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--accent-cyan);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%; max-width: 380px;
    }

    .modal-title {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 16px;
      text-transform: lowercase; color: var(--accent-cyan);
      text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
    }

    input.task-input {
      width: 100%; background: rgba(10, 8, 20, 0.6); border: 1px solid var(--outline);
      border-radius: 8px; color: var(--on-surface); padding: 12px 14px; font-size: 1rem;
      outline: none; margin-bottom: 20px; user-select: text; -webkit-user-select: text;
    }

    input.task-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
    }

    .modal-actions { display: flex; gap: 10px; }
    
    .btn {
      flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--outline);
      font-weight: 700; font-size: 0.9rem; cursor: pointer; text-transform: lowercase;
    }

    .btn-secondary { background: transparent; color: var(--on-surface-muted); }
    
    .btn-primary {
      background: var(--accent-pink);
      color: #fff;
      border-color: var(--accent-pink);
      box-shadow: 0 0 14px rgba(255, 0, 127, 0.6);
    }

    /* --- Toast --- */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--surface); color: var(--on-surface); border: 1px solid var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; pointer-events: none; opacity: 0;
      transition: all 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); z-index: 200; text-transform: lowercase;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <!-- Background Animated Synthwave Grid -->
  <div class="grid-container">
    <div class="grid-floor"></div>
  </div>
  <div class="scanlines"></div>

  <header>
    <div class="header-left">
      <img src="./icon.svg" class="app-icon" alt="neon rnnr icon">
      <h1>neon rnnr</h1>
    </div>
    <button class="icon-btn" onclick="openAddModal()" aria-label="Add Task">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <div class="task-list" id="taskList"></div>

  <!-- Edit / Add Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">add task</div>
      <input type="text" class="task-input" id="taskInput" placeholder="Task description..." autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeEditModal()">cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="exitToast">swipe back again to exit</div>

  <script>
    const STORAGE_KEY = 'neon_rnnr_pwa_tasks_v1';
    
    // Custom Default Running Routine
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
      { id: '1', text: 'Long run', done: false },
      { id: '2', text: 'Intervals OR intense hills', done: false },
      { id: '3', text: 'Easy run 45-60m', done: false }
    ];

    let isModalOpen = false;
    let editingTaskId = null;
    let lastBackTime = 0;
    let toastTimeout = null;

    function initApp() {
      checkWeeklyReset();
      renderTasks();
      history.replaceState({ modalOpen: false }, '');
    }

    // Native Back Interceptor
    window.addEventListener('popstate', (e) => {
      if (isModalOpen) {
        closeEditModalDOM();
      } else {
        const now = Date.now();
        if (now - lastBackTime < 2000) {
          history.back();
        } else {
          lastBackTime = now;
          history.pushState({ modalOpen: false }, '');
          showExitToast();
        }
      }
    });

    function showExitToast() {
      const toast = document.getElementById('exitToast');
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    function renderTasks() {
      const listEl = document.getElementById('taskList');
      listEl.innerHTML = '';

      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = `task-card ${task.done ? 'completed' : ''}`;
        card.onclick = () => toggleTask(task.id);
        card.innerHTML = `
          <div class="checkbox">
            ${task.done ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </div>
          <div class="task-text">${escapeHtml(task.text)}</div>
        `;
        listEl.appendChild(card);
      });
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        saveTasks();
        renderTasks();
      }
    }

    function openAddModal() {
      editingTaskId = null;
      document.getElementById('modalTitle').innerText = 'add task';
      document.getElementById('taskInput').value = '';
      openEditModalDOM();
    }

    function openEditModalDOM() {
      isModalOpen = true;
      document.getElementById('editModal').classList.add('active');
      history.pushState({ modalOpen: true }, '');
    }

    function closeEditModalDOM() {
      isModalOpen = false;
      document.getElementById('editModal').classList.remove('active');
    }

    function closeEditModal() {
      history.back();
    }

    function saveTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;

      if (editingTaskId) {
        const task = tasks.find(t => t.id === editingTaskId);
        if (task) task.text = text;
      } else {
        tasks.push({ id: Date.now().toString(), text: text, done: false });
      }

      saveTasks();
      renderTasks();
      closeEditModal();
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function checkWeeklyReset() {
      const RESET_KEY = 'neon_rnnr_last_reset_v1';
      const lastReset = localStorage.getItem(RESET_KEY);
      const now = new Date();
      const currentWeek = `${now.getFullYear()}-W${getWeekNumber(now)}`;

      if (lastReset !== currentWeek) {
        tasks.forEach(t => t.done = false);
        saveTasks();
        localStorage.setItem(RESET_KEY, currentWeek);
      }
    }

    function getWeekNumber(d) {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); });
    }

    initApp();
  </script>
</body>
</html>
